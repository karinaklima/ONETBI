<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login BI</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- LADO ESQUERDO -->
  <section class="left-side">

    <div class="left-content">

      <!-- LOGO PRINCIPAL -->
      <!-- <img
        src="imagem/logo_onet_claro.png"
        alt="Logo Principal"
        class="logo-left"
      > -->
        
    </div>

    
  </section>

  <!-- LADO DIREITO -->
  <section class="right-side">

    <div class="login-card">

      <!-- LOGO FORMULÁRIO -->
      <img
        src="imagem/logo_onet_colorido.png"
        alt="Logo Formulário"
        class="form-logo"
      >

      <h1>Acesse o BI</h1>

      <p class="subtitle">
        Informe suas credenciais para continuar
      </p>

      <form id="loginForm">

        <div class="input-group">

          <label for="usuario">
            Usuário
          </label>

          <input
            type="text"
            id="usuario"
            placeholder="Digite seu usuário"
          >

        </div>

        <div class="input-group">

          <label for="senha">
            Senha
          </label>

          <input
            type="password"
            id="senha"
            placeholder="Digite sua senha"
          >

        </div>

        <div class="remember">

          <input
            type="checkbox"
            id="lembrar"
          >

          <label for="lembrar">
            Lembrar meu usuário
          </label>

        </div>

        <button type="submit" class="btn-login">
          Entrar
        </button>

      </form>

      <footer>
        © 2026 ONET BRASIL - BI
      </footer>

    </div>

  </section>

  <script src="app.js"></script>

</body>
</html>

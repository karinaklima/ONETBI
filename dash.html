<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <title>Dashboard BI</title>

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{

  
      background: #363A40;
    
    }
    

.logo-menu{
  width: 300px;

  margin-left: -65px; /* ajusta para a esquerda */
  margin-bottom: 30px;
}
    .dashboard-container{
  margin-left: 220px;
  padding: 0;
}

    iframe{
  width: 100%;
  height: 95vh;

  border: none;
  margin: 0;
  display: block;

  border-radius: 0;
  box-shadow: none;
}

.sidebar{
  width: 220px;
  height: 100vh;

  background: #272a2e;

  position: fixed;
  display: flex;
  flex-direction: column;
  top: 0px;
  left: 0px; 

  transition: 0.3s;

  padding: 20px;

  z-index: 1000;
}

.sidebar h2{
  color: white;
  margin-bottom: 20px;
}

.sidebar button{
  display: flex;
  align-items: center;
  gap: 25px; 

  width: 100%;
  background: transparent;
  color: white;
  border: none;
  padding: 14px;
  cursor: pointer;
  text-align: left;

  font-size: 18px;  
  font-weight: 300;
}

.sidebar button:hover{
  background: #32415d;
}

.sidebar button.active{
  background: #32415d;
}

.menu-footer{
  margin-top: auto;
  margin-bottom: 60px;
}

.btn-sair{
  border: 1px solid #5a6778 !important;
  border-radius: 10px !important;

  background: transparent !important;

  color: white !important;
}
.btn-sair:hover{
  background: #090849 !important;
}
.dashboard-container{
  padding: 20px;

  transition: 0.3s;
}

.dashboard-container.shift{
  margin-left: 250px;
}
  </style>

</head>

<body>
  
    <aside class="sidebar">

    <img src="imagem/logobi.png" class="logo-menu">

   <button onclick="trocarPagina('Gestao Backlog')">
    <i class="fa-solid fa-chart-line"></i>
    Gestão Backlog
  </button>

    <button onclick="trocarPagina('Todos')">
      <i class="fa-solid fa-file-lines"></i>
      Relatório Geral
    </button>

    <button onclick="trocarPagina('Todos no Tempo')">
      <i class="fa-solid fa-file-invoice"></i>
      Histórico Geral
    </button>

    <button onclick="trocarPagina('IMREA')">
      <i class="fa-solid fa-chart-pie"></i> 
      IMREA
    </button>

    <button onclick="trocarPagina('Comentarios')">
      <i class="fa-solid fa-comments"></i>
      Comentários
    </button>


<div class="menu-footer">

  <button class="btn-sair" onclick="logout()">
    <i class="fa-solid fa-sign-out-alt"></i>
    Sair
  </button>

</div>
  </aside>

  <main class="dashboard-container" id="dashboard-container">

    <iframe
      id="powerbi-frame"
      src="https://app.powerbi.com/reportEmbed?reportId=e8f84daf-97f4-40ef-b165-a5f8a78b9fd0&autoAuth=true&ctid=56670a1c-98e6-4338-b03d-b0ab8219704e&navContentPaneEnabled=false&filterPaneEnabled=false&pageNavigationPosition=hidden">
    </iframe>
  </main>

  <script>

  function logout(){

  sessionStorage.removeItem("logado");

  window.location.href = "index.html";

}

  function trocarPagina(pageId){

  const iframe =
  document.getElementById("powerbi-frame");

  iframe.src =
  "https://app.powerbi.com/reportEmbed?reportId=386a77e1-f887-4c2f-a2db-d62c65e2b052" +
  "&autoAuth=true" +
  "&ctid=56670a1c-98e6-4338-b03d-b0ab8219704e" +
  "&navContentPaneEnabled=false" +
  "&filterPaneEnabled=false" +
  "&pageNavigationPosition=hidden" +
  "&pageName=" + pageId;

}


</script>
</body>
</html>

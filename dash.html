    .topbar{

.sidebar{
  width: 250px;
  height: calc(100vh - 70px);

  background: #363A40;

  position: fixed;

  top: 70px;
  left: -250px;

  transition: 0.3s;

  padding: 20px;

  z-index: 1000;
}

.sidebar.active{
  left: 0;
}

.sidebar h2{
  color: white;
  margin-bottom: 20px;
}

.sidebar button{

  width: 100%;

  margin-bottom: 15px;

  padding: 15px;

  border: none;

  border-radius: 10px;

  background: #32415d;

  color: white;

  cursor: pointer;

  font-size: 16px;

  transition: 0.3s;
}

.sidebar button:hover{
  background: #32415d;
}

.dashboard-container{
  padding: 20px;

  transition: 0.3s;
}

.dashboard-container.shift{
  margin-left: 250px;
}
